<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="container">
            <div class="cal">
                <h1>Simple calculator</h1>
                <p>preparing a simple calculator</p>
                <span id="calculator">Calculate
                    <div>
                        <label for="num1"> Number</label>
                        <input type="number" id="num1" placeholder="e.g 2"></option>
                    </div>
                    <div>
                        <label for="num2"> Number</label>
                        <input type="number" id="num2" placeholder="e.g 2"></option>
                    </div>
                </span>
                <div id="operator">operator</div>
                <select name="operator" id="operator">
                    <option value="+">+</option>
                    <option value="-">-</option>
                     <option value="*">*</option>
                    <option value="/">/</option>
                </select>
            </div>
            <button id="calculate">result</button>
            <div id="calresult">result</div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
